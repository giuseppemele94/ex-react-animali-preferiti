<!-- 

 📌 Milestone 2: Aggiungere Animali Casuali
1. Trasforma l’array animals usando useState (l’array è inizialmente vuoto).
2. Aggiungi un bottone "Aggiungi Animale" sopra il <details>.
3. Cliccando il bottone, un animale casuale viene aggiunto alla lista.
4. Usa un array predefinito per scegliere casualmente:
  const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];
5. L’animale selezionato deve essere aggiunto all’interno della lista <ul> come <li>.

 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel aiuta a scrivere la sintassi jsx direttamente nell'html-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="../style.css">


    <script type="text/babel">

        const {useState} = React; 

        const ListaAnimali = () => {

            //array inizialmente vuoto 
            const [animals,setAnimals] = useState([]);

            //array da cui pescare gli animali casualmente
            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            //funzione per aggiungere gli animali 
            const aggiungiAnimale = () => {

                //genero un indice randomico dall'array animalChoises
                const randomIndex = Math.floor(Math.random() * animalsChoices.length);
                console.log("indice : ",randomIndex);
                //uso l'indice per prendere un animale dall'array predefinito
                const animaleCasuale = animalsChoices[randomIndex];
                console.log(`Animale all'indice  ${randomIndex} : ${animaleCasuale}`); 

                //aggiungo il nuovo animale alla lista
                setAnimals([...animals,animaleCasuale]);
            }

            return (
<>
            <button onClick={aggiungiAnimale} >Aggiungi animale</button>
                <details>
                    <summary>Animali</summary>
                    <ul>
                        {
                            animals.map((animal, index) => {
                                return <li key={index}>{animal}</li>
                            })
                        }
                    </ul>
                </details>
                </>

            )
        }
    </script>


<!--renderizzo il componente nel div presente nel body dentro l'elemento html -->
    <script type="text/babel">

        const { createRoot } = ReactDOM;
        const listaAnimali = document.querySelector('.lista-animali');
        const root = createRoot(listaAnimali);
        root.render(<ListaAnimali />)

    </script>


</head>



<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali">

        </div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
