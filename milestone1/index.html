<!-- 

 Milestone 1: Inserire un Componente React
1. Monta un componente React all’interno dell’elemento con classe .lista-animali.
2. Il componente deve includere:
   - Un elemento <details> con titolo "Animali", che contiene:
   - Una lista <ul> statica che viene creata a partire da un array di stringhe (animals) 
    dove ciascuna stringa rappresenta il nome di un animale.

 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel aiuta a scrivere la sintassi jsx direttamente nell'html-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="../style.css">


    <script type="text/babel">

        const ListaAnimali = () => {

            const animals = ["Gatto", "Cane", "Topo", "Giraffa"];
            return (

                <details>
                    <summary>Animali</summary>
                    <ul>
                        {
                            animals.map((animal, index) => {
                                return <li key={index}>{animal}</li>
                            })
                        }
                    </ul>
                </details>

            )
        }
    </script>


<!--renderizzo il componente nel div presente nel body dentro l'elemento html -->
    <script type="text/babel">

        const { createRoot } = ReactDOM;
        const listaAnimali = document.querySelector('.lista-animali');
        const root = createRoot(listaAnimali);
        root.render(<ListaAnimali />)

    </script>


</head>



<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali">

        </div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
